<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffalo Slot - 1024 Ways</title>
    <link rel="stylesheet" href="buffalo.css">
</head>
<body>
<div class="game-container">
    <div class="header">
        <div> BUFFALO</div>
        <div>CREDIT: <span id="creditDisplay">1000</span></div>
        <div>WIN: <span id="winDisplay">0</span></div>
    </div>

    <div id="slotGrid" class="slot-grid">
        <!-- JS will generate 20 cells (5 cols x 4 rows) -->
    </div>

    <div class="controls">
        <button id="spinBtn" class="spin"> SPIN</button>
        <div class="info">
            <span> BET: 10</span>
            <span class="credit-box"> 1024 WAYS</span>
        </div>
    </div>
</div>

<script src="buffalo.js"></script>
</body>
</html>
