<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buffalo Gold - Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">BUFFALO</div>
            <div class="stats">
                <div class="stat-box">
                    <span class="label">CREDIT</span>
                    <span class="value" id="creditDisplay">1276</span>
                </div>
                <div class="stat-box">
                    <span class="label">WIN</span>
                    <span class="value" id="winDisplay">46</span>
                </div>
                <div class="stat-box">
                    <span class="label">FREE</span>
                    <span class="value" id="freeSpinDisplay">0</span>
                </div>
            </div>
        </div>

        <!-- Reels Wrapper -->
        <div class="reels-wrapper">
            <div id="slotGrid" class="slot-grid">
                <!-- JS will inject cells here later -->
            </div>
        </div>

        <!-- Footer Controls -->
        <div class="controls">
            <div class="badge">1024 WAYS</div>
            <div class="spin-area">
                <button id="spinBtn" class="spin-btn">SPIN</button>
                <div class="bet-label">BET: 10</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
