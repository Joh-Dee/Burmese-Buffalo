<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buffalo Gold - Slot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="header">
                <div class="logo"> BUFFALO</div>
                <div class="stats">
                    <div>CREDIT: <span id="creditDisplay">2000</span></div>
                    <div>WIN: <span id="winDisplay">0</span></div>
                </div>
            </div>
            <div class="reels-wrapper">
                <div id="slotGrid" class="slot-grid"></div>
            </div>
            <div class="controls">
                <button id="spinBtn" class="spin-btn"> SPIN</button>
                <div class="info-panel">
                    <span>BET: 10</span>
                    <span class="badge">1024 WAYS</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
