<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>American Buffalo Slot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Game Container -->
    <div id="game-container">
        <!-- Header Section -->
        <div id="header">
            <div class="title">BUFFALO</div>
            <div class="stats">
                <div class="stat-box"><span class="label">CREDIT</span> <span id="credit-display">1000</span></div>
                <div class="stat-box"><span class="label">WIN</span> <span id="win-display">0</span></div>
                <div class="stat-box"><span class="label">FREE</span> <span id="free-display">0</span></div>
            </div>
        </div>

        <!-- Slot Machine Reel Area -->
        <div id="slot-machine">
            <div id="reels-container">
                <!-- 5 Reels will be generated by JS -->
                <div class="reel" id="reel-0"></div>
                <div class="reel" id="reel-1"></div>
                <div class="reel" id="reel-2"></div>
                <div class="reel" id="reel-3"></div>
                <div class="reel" id="reel-4"></div>
            </div>
            <!-- Highlight overlay container -->
            <div id="highlights-container"></div>
        </div>

        <!-- Bottom Control Panel -->
        <div id="bottom-panel">
            <div class="info-left">
                <span class="badge">1024 WAYS</span>
            </div>
            <button id="spin-button" class="spin-btn">
                <span class="btn-text">SPIN</span>
                <span class="btn-sub">BET: 10</span>
            </button>
            <div class="info-right">
                <!-- balance display can be kept minimal -->
            </div>
        </div>
    </div>

    <!-- Win Popup (for big wins or free spin notification) -->
    <div id="win-popup" class="hidden">
        <div class="popup-content">
            <div id="popup-message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
